<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>slow goods — on SUZURI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
:root {
  --bg: #f6efe2;
  --bg-soft: #efe6d3;
  --bg-warm: #ebdfc7;
  --paper: #fbf6ec;
  --ink: #3d2f24;
  --ink-soft: #6b574a;
  --ink-mute: #9a8674;
  --line: #d8c9ad;
  --line-soft: #e6d8bd;
  --accent: #b8633a;
  --accent-deep: #8d4a2b;
  --accent-soft: #e3a87f;
  --gold: #c79759;

  --radius: 10px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 2px rgba(61,47,36,0.06), 0 4px 12px rgba(61,47,36,0.04);
  --shadow-md: 0 2px 6px rgba(61,47,36,0.08), 0 14px 28px rgba(61,47,36,0.07);

  --max: 1200px;
  --pad: 80px;
  --pad-y: 120px;

  --font-serif: "Zen Old Mincho", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  --font-sans: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  --font-mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
}

[data-density="compact"] { --pad-y: 80px; --pad: 56px; }
[data-density="airy"] { --pad-y: 160px; --pad: 96px; }

[data-palette="forest"] {
  --bg: #fbf6ee; --bg-soft: #f0eadb; --bg-warm: #e6e0cb; --paper: #fdfaf3;
  --ink: #2d2f25; --ink-soft: #5a5d4a; --ink-mute: #909377;
  --line: #d2cfb6; --line-soft: #e2dec5;
  --accent: #6f8a5b; --accent-deep: #4f6840; --accent-soft: #b3c89e; --gold: #c4a05c;
}
[data-palette="terracotta"] {
  --bg: #fdf4e8; --bg-soft: #f6e6d0; --bg-warm: #efd9b8; --paper: #fff9ee;
  --ink: #2f2722; --ink-soft: #5d4a3a; --ink-mute: #a08a6f;
  --line: #e9c89e; --line-soft: #f0dcb8;
  --accent: #d97a4e; --accent-deep: #b35a30; --accent-soft: #f0b48a; --gold: #d4a574;
}
[data-palette="sand"] {
  --bg: #f4ede0; --bg-soft: #ebe1cc; --bg-warm: #ddcfae; --paper: #faf4e8;
  --ink: #3a2d1f; --ink-soft: #6e5a44; --ink-mute: #a08a72;
  --line: #cfbe98; --line-soft: #ddd0ad;
  --accent: #a8845a; --accent-deep: #80623d; --accent-soft: #d3b88a; --gold: #c79759;
}

[data-dark="true"] {
  --bg: #1f1a14; --bg-soft: #25201a; --bg-warm: #2c251c; --paper: #2a241c;
  --ink: #f3ead8; --ink-soft: #c9bca0; --ink-mute: #93876d;
  --line: #463b2c; --line-soft: #38301f;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "palt";
  background-image:
    radial-gradient(ellipse 1200px 800px at 10% -10%, rgba(184,99,58,0.05), transparent 60%),
    radial-gradient(ellipse 900px 700px at 110% 20%, rgba(199,151,89,0.06), transparent 60%);
}
a { color: inherit; text-decoration: none; }
button { font: inherit; }
img { display: block; max-width: 100%; }

.container {
  max-width: var(--max);
  margin: 0 auto;
  padding-left: var(--pad);
  padding-right: var(--pad);
}

@media (max-width: 900px) {
  :root { --pad: 24px; --pad-y: 80px; }
}

/* ───── header ───── */
.site-header {
  position: sticky; top: 0; z-index: 30;
  backdrop-filter: blur(10px);
  background: color-mix(in srgb, var(--bg) 84%, transparent);
  border-bottom: 1px solid var(--line-soft);
}
.site-header-inner {
  max-width: var(--max); margin: 0 auto;
  padding: 16px var(--pad);
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.brand { display: inline-flex; align-items: baseline; gap: 10px; color: var(--ink); }
.brand-mark { color: var(--accent); display: inline-flex; align-self: center; }
.brand-name { font-family: var(--font-serif); font-size: 20px; letter-spacing: 0.02em; font-weight: 500; }
.brand-sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: lowercase; }
.site-nav { display: flex; align-items: center; gap: 28px; font-size: 14px; color: var(--ink-soft); }
.site-nav a { transition: color .2s ease; }
.site-nav a:hover { color: var(--ink); }
.nav-cta {
  background: var(--ink); color: var(--paper) !important;
  padding: 10px 16px; border-radius: 999px; font-size: 13px;
  font-family: var(--font-sans);
  transition: background .2s ease, transform .2s ease;
}
.nav-cta:hover { background: var(--accent-deep); transform: translateY(-1px); }
@media (max-width: 720px) {
  .site-nav { gap: 16px; }
  .site-nav a:not(.nav-cta) { display: none; }
  .brand-sub { display: none; }
}

/* ───── buttons ───── */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px; border-radius: 999px;
  font-size: 14.5px; font-weight: 500; letter-spacing: 0.03em;
  transition: transform .2s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
  white-space: nowrap; cursor: pointer; border: none;
}
.btn-primary { background: var(--ink); color: var(--paper); box-shadow: var(--shadow-sm); }
.btn-primary:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { background: var(--bg-soft); }
.btn-outline {
  background: transparent; color: inherit;
  border: 1px solid currentColor; opacity: 0.85;
}
.btn-outline:hover { background: rgba(0,0,0,0.05); opacity: 1; }
.design-dark .btn-outline:hover { background: rgba(255,255,255,0.08); }
.btn-large { padding: 18px 30px; font-size: 16px; }

/* ───── eyebrow / section heading ───── */
.eyebrow, .section-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.14em;
  text-transform: lowercase; color: var(--ink-mute);
}
.eyebrow-dot {
  width: 6px; height: 6px; background: var(--accent);
  border-radius: 999px;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.section-head { padding: 0 0 56px; max-width: 720px; }
.section-title {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: clamp(32px, 4.4vw, 52px);
  line-height: 1.3; letter-spacing: 0.01em;
  margin: 18px 0 18px; color: var(--ink);
}
.section-lead {
  color: var(--ink-soft); font-size: 15.5px; line-height: 2;
  margin: 0; max-width: 540px;
}

/* ───── hero ───── */
.hero { padding: 64px 0 0; position: relative; }
.hero-grid {
  max-width: var(--max); margin: 0 auto;
  padding: 24px var(--pad) 64px;
  display: grid; grid-template-columns: 1.05fr 1fr;
  gap: 72px; align-items: center;
}
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
}
.hero-title {
  font-family: var(--font-serif); font-weight: 500;
  font-size: clamp(38px, 5.4vw, 68px);
  line-height: 1.35; letter-spacing: 0.005em;
  margin: 22px 0 28px; color: var(--ink);
  text-wrap: pretty;
}
.hero-title em {
  font-style: normal; position: relative; color: var(--accent-deep);
}
.hero-title em::after {
  content: ""; position: absolute;
  left: -2px; right: -2px; bottom: 0.08em;
  height: 0.32em; background: var(--accent-soft);
  opacity: 0.45; z-index: -1; border-radius: 3px;
}
.hero-sub {
  color: var(--ink-soft); font-size: 16px; line-height: 2;
  max-width: 480px; margin: 0 0 36px;
}
.hero-cta-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 48px; }
.hero-meta {
  list-style: none; padding: 24px 0 0; margin: 0;
  display: flex; gap: 40px; border-top: 1px dashed var(--line);
}
.hero-meta li { display: flex; flex-direction: column; gap: 2px; }
.hero-meta strong {
  font-family: var(--font-serif); font-weight: 500;
  font-size: 24px; color: var(--ink);
}
.hero-meta span {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.1em; color: var(--ink-mute); text-transform: uppercase;
}

.hero-art {
  display: grid; grid-template-columns: 1.7fr 1fr;
  gap: 16px; height: 460px;
}
.hero-art-frame {
  position: relative;
  background: var(--paper);
  border-radius: var(--radius-lg);
  border: 1px solid var(--line-soft);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.hero-art-frame > img {
  width: 100%; height: 100%; object-fit: contain;
  padding: 2%;
}
.hero-art-side {
  display: grid; grid-template-rows: 1.4fr 1fr; gap: 16px;
}
.hero-art-cell {
  position: relative;
  background: var(--paper);
  border-radius: var(--radius-lg);
  border: 1px solid var(--line-soft);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.hero-art-cell img {
  width: 100%; height: 100%; object-fit: contain; padding: 2%;
}
.hero-tag {
  position: absolute; top: 18px; left: 18px;
  background: var(--paper); border: 1px solid var(--line);
  padding: 8px 14px 8px 12px;
  border-radius: 999px;
  display: inline-flex; flex-direction: column; gap: 0; line-height: 1.1;
  box-shadow: var(--shadow-sm); z-index: 2;
}
.hero-tag-num { font-family: var(--font-mono); font-size: 11px; color: var(--accent-deep); letter-spacing: 0.06em; }
.hero-tag-label { font-family: var(--font-serif); font-size: 13px; color: var(--ink); }
@media (max-width: 900px) { .hero-art { height: 360px; } }

.marquee {
  border-top: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-soft);
  overflow: hidden; margin-top: 24px;
}
.marquee-track {
  display: flex; gap: 0; width: max-content;
  animation: marquee 50s linear infinite;
}
.marquee-row {
  display: flex; align-items: center; gap: 40px;
  padding: 18px 20px;
  font-family: var(--font-serif); font-size: 14px;
  letter-spacing: 0.06em; color: var(--ink-soft);
  flex-shrink: 0;
}
.marquee-row span:nth-child(even) { color: var(--accent); font-size: 11px; font-family: var(--font-mono); }
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ───── concept ───── */
.concept {
  padding: var(--pad-y) 0;
  max-width: var(--max); margin: 0 auto;
  padding-left: var(--pad); padding-right: var(--pad);
}
.concept-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
}
@media (max-width: 900px) { .concept-grid { grid-template-columns: 1fr; } }
.concept-card {
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  padding: 36px 32px 32px;
  transition: transform .3s ease, box-shadow .3s ease;
}
.concept-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.concept-num {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.16em; color: var(--accent);
  margin-bottom: 24px; display: inline-block;
  padding: 4px 10px; border: 1px solid var(--accent-soft);
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent-soft) 18%, transparent);
}
.concept-title {
  font-family: var(--font-serif); font-weight: 500;
  font-size: 20px; line-height: 1.55;
  margin: 0 0 14px; color: var(--ink);
}
.concept-body { color: var(--ink-soft); font-size: 14.5px; line-height: 2; margin: 0; }

/* ───── designs ───── */
.designs { }
.designs-intro { padding: var(--pad-y) var(--pad) 56px; }

.design {
  padding: 96px 0;
  background: var(--bg);
  border-top: 1px solid var(--line-soft);
}
.design + .design { border-top: 1px solid color-mix(in srgb, var(--ink) 8%, transparent); }
.design-dark {
  background: var(--bg);
  color: #f3ead8;
}
.design-dark .design-title,
.design-dark .design-desc,
.design-dark .design-feature-name,
.design-dark .design-mini-name {
  color: #f3ead8;
}
.design-dark .design-feature-price,
.design-dark .design-mini-price {
  color: color-mix(in srgb, #f3ead8 75%, transparent);
}
.design-inner {
  max-width: var(--max); margin: 0 auto;
  padding-left: var(--pad); padding-right: var(--pad);
}
.design-head { max-width: 720px; margin: 0 0 56px; }
.design-head-left { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.design-num {
  display: inline-flex; align-items: baseline; gap: 6px;
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.1em; color: currentColor; opacity: 0.7;
}
.design-num-val {
  font-family: var(--font-serif); font-size: 28px; font-weight: 500;
  color: var(--accent); opacity: 1;
  letter-spacing: 0;
}
.design-num-total { opacity: 0.5; }
.design-tag {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 999px;
  background: var(--accent); color: #fff;
  align-self: center;
}
.design-title {
  font-family: var(--font-serif); font-weight: 500;
  font-size: clamp(30px, 4vw, 46px);
  line-height: 1.35; margin: 0 0 16px; color: var(--ink);
  letter-spacing: 0.005em;
}
.design-desc {
  color: var(--ink-soft); line-height: 2; font-size: 15px;
  margin: 0 0 18px; max-width: 600px;
}
.design-dark .design-desc { color: color-mix(in srgb, #f3ead8 75%, transparent); }
.design-stats {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-mono); font-size: 12px;
  color: currentColor; opacity: 0.65;
  letter-spacing: 0.06em;
}
.design-stats .dot { opacity: 0.4; }

.design-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 32px;
  align-items: stretch;
}
@media (max-width: 900px) {
  .design-grid { grid-template-columns: 1fr; }
}
.design-feature {
  display: flex; flex-direction: column; gap: 16px;
  transition: transform .25s ease;
}
.design-feature:hover { transform: translateY(-4px); }
.design-feature-img {
  position: relative;
  aspect-ratio: 1 / 1;
  background: #fff;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--line-soft);
  box-shadow: var(--shadow-md);
}
.design-feature-img img {
  width: 100%; height: 100%; object-fit: contain; padding: 6%;
}
.design-feature-tag {
  position: absolute; top: 16px; left: 16px;
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px;
  background: var(--ink); color: var(--paper);
}
.design-feature-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 16px; padding: 0 4px;
}
.design-feature-name {
  font-family: var(--font-serif); font-size: 18px; color: var(--ink);
}
.design-feature-price {
  font-family: var(--font-mono); font-size: 14px; color: var(--ink-soft);
}

.design-rest {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  align-content: stretch;
}
.design-mini {
  display: flex; flex-direction: column; gap: 10px;
  transition: transform .25s ease;
}
.design-mini:hover { transform: translateY(-3px); }
.design-mini-img {
  position: relative;
  aspect-ratio: 1 / 1;
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--line-soft);
  box-shadow: var(--shadow-sm);
}
.design-mini-img img {
  width: 100%; height: 100%; object-fit: contain; padding: 8%;
}
.design-mini-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 8px; padding: 0 2px;
  font-size: 12.5px;
}
.design-mini-name {
  font-family: var(--font-serif); font-size: 14px; color: var(--ink);
  flex: 1; min-width: 0;
}
.design-mini-price {
  font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft);
}

.design-foot {
  margin-top: 56px; display: flex; justify-content: center;
}

/* ───── faq ───── */
.faq {
  padding: var(--pad-y) 0;
  max-width: 820px; margin: 0 auto;
  padding-left: var(--pad); padding-right: var(--pad);
}
.faq-list { border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-item summary {
  list-style: none; cursor: pointer;
  display: grid; grid-template-columns: 60px 1fr 24px;
  align-items: center; gap: 16px;
  padding: 24px 8px;
  transition: background .2s ease;
}
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item:hover summary { background: var(--bg-soft); }
.faq-q-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--accent); }
.faq-q-text { font-family: var(--font-serif); font-size: 16.5px; color: var(--ink); }
.faq-q-mark {
  font-family: var(--font-serif); font-size: 22px;
  color: var(--ink-mute); text-align: center;
  transition: transform .25s ease; line-height: 1;
}
.faq-item[open] .faq-q-mark { transform: rotate(45deg); }
.faq-a { padding: 0 8px 28px 84px; color: var(--ink-soft); line-height: 2; font-size: 14.5px; }
@media (max-width: 600px) {
  .faq-item summary { grid-template-columns: 48px 1fr 20px; gap: 10px; }
  .faq-a { padding-left: 58px; }
}

/* ───── final CTA ───── */
.final-cta {
  background: var(--ink);
  color: var(--paper);
  padding: var(--pad-y) 0;
  text-align: center;
  position: relative; overflow: hidden;
}
.final-cta::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 0%, color-mix(in srgb, var(--accent) 25%, transparent), transparent 60%),
    radial-gradient(ellipse 500px 360px at 90% 100%, color-mix(in srgb, var(--gold) 18%, transparent), transparent 60%);
  pointer-events: none;
}
.final-cta-inner {
  position: relative;
  max-width: 760px; margin: 0 auto;
  padding-left: var(--pad); padding-right: var(--pad);
}
.eyebrow-on-dark { color: color-mix(in srgb, var(--paper) 70%, transparent); }
.final-cta-title {
  font-family: var(--font-serif); font-weight: 500;
  font-size: clamp(30px, 4vw, 48px);
  line-height: 1.45; margin: 18px 0 24px; color: var(--paper);
}
.final-cta-body {
  color: color-mix(in srgb, var(--paper) 80%, transparent);
  line-height: 2; font-size: 15px;
  margin: 0 auto 40px; max-width: 520px;
}
.final-cta .btn-primary { background: var(--paper); color: var(--ink); }
.final-cta .btn-primary:hover { background: var(--accent-soft); color: var(--ink); }
.final-cta-note {
  margin-top: 20px;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.08em;
  color: color-mix(in srgb, var(--paper) 50%, transparent);
}

/* ───── footer ───── */
.site-footer {
  background: var(--bg-soft);
  padding: 48px 0 36px;
  border-top: 1px solid var(--line-soft);
}
.site-footer-inner {
  max-width: var(--max); margin: 0 auto;
  padding-left: var(--pad); padding-right: var(--pad);
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.footer-brand {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-serif); font-size: 16px; color: var(--ink);
}
.footer-nav {
  display: flex; gap: 24px;
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.08em; color: var(--ink-soft);
}
.footer-nav a:hover { color: var(--accent); }
.footer-copy {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.04em;
}
  </style>
</head>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        style={{
          position: 'fixed', right: 16, bottom: 16, zIndex: 2147483646,
          background: 'rgba(61,47,36,0.9)', color: '#fbf6ec',
          border: 'none', borderRadius: '999px', padding: '10px 18px',
          font: '12px/1 ui-sans-serif,system-ui,sans-serif', fontWeight: 600,
          cursor: 'pointer', backdropFilter: 'blur(8px)',
          boxShadow: '0 2px 12px rgba(0,0,0,0.25)',
          letterSpacing: '0.04em',
        }}
      >
        Tweaks
      </button>
    );
  }

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, label, children }) {
  return (
    <>
      <div className="twk-sect">{title || label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          // Support {value, color} objects, plain arrays, or plain strings
          const isObj = o && typeof o === 'object' && !Array.isArray(o);
          const optValue = isObj ? o.value : o;
          const rawColors = isObj ? o.color : o;
          const colors = Array.isArray(rawColors) ? rawColors : [rawColors];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = optValue === value;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(optValue)}>
              {sup.length > 0 && (
                <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakColor,
});
  </script>

const TWEAK_DEFAULTS = {

  density: 'default',
  dark: false,
};

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-palette', t.palette);
    root.setAttribute('data-density', t.density);
    root.setAttribute('data-dark', String(!!t.dark));
  }, [t.palette, t.density, t.dark]);

  return (
    <>
      <SiteHeader />
      <main id="top">
        <Hero />
        <Concept />
        <Designs />
        <FAQ />
        <FinalCTA />
      </main>
      <SiteFooter />

      <TweaksPanel title="Tweaks">
        <TweakSection title="ムード">
          <TweakRadio
            label="ダークモード"
            value={t.dark ? 'on' : 'off'}
            options={[
              { value: 'off', label: 'Light' },
              { value: 'on', label: 'Dark' },
            ]}
            onChange={(v) => setTweak('dark', v === 'on')}
          />
        </TweakSection>
        <TweakSection title="カラーパレット">
          <TweakColor
            label="トーン"
            value={t.palette}
            options={[
              { value: 'cream', color: ['#f6efe2', '#b8633a', '#3d2f24'] },
              { value: 'forest', color: ['#fbf6ee', '#6f8a5b', '#2d2f25'] },
              { value: 'terracotta', color: ['#fdf4e8', '#d97a4e', '#2f2722'] },
              { value: 'sand', color: ['#f4ede0', '#a8845a', '#3a2d1f'] },
            ]}
            onChange={(v) => setTweak('palette', v)}
          />
        </TweakSection>
        <TweakSection title="レイアウト">
          <TweakRadio
            label="余白"
            value={t.density}
            options={[
              { value: 'compact', label: 'Compact' },
              { value: 'default', label: 'Normal' },
              { value: 'airy', label: 'Airy' },
            ]}
            onChange={(v) => setTweak('density', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
  </script>
